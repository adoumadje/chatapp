server:
  port: 8088

client:
  url: "chrome-extension://*"

broker:
  prefix:
    destination: "/topic"
    handshake: "/ws-handshake"
    private-message: "/topic/private-message"
    group-message: "/topic/group-message"
    error-message: "/topic/error-message"
    application-message: "/app"

spring:
  application:
    name: chatapp

  config:
    import:
      - "application-liquibase.yaml"

  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:chatappdb
    username: sa
    password: ''
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: 'create-drop'
  kafka:
    bootstrap-servers: "localhost:9092"

    # Producer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer



user:
  events:
    topic:
      name: "user-events"