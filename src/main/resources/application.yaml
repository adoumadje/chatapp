server:
  port: 8088

client:
  url: "chrome-extension://*"

broker:
  prefix:
    destination: "/topic"
    handshake: "/ws-handshake"
    private-message: "/topic/private-message"
    group-message: "/topic/group-message"
    error-message: "/topic/error-message"
    application-message: "/app"

spring:
  application:
    name: chatapp

  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:chatappdb
    username: sa
    password: ''
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: 'create-drop'

# Kafka
  kafka:
    admin:
      auto-create: true
    bootstrap-servers: localhost:9091

# Kafka Producer
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable:
          idempotence: true
        linger:
          ms: 0
        allow:
          auto:
            create:
              topics: false
        max:
          in:
            flight:
              requests:
                per:
                  connection: 5
        request:
          timeout:
            ms: 30000
        delivery:
          timeout:
            ms: 120000
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer